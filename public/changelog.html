<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Changelog • SamSke Studio Suite</title>
    <link rel="stylesheet" href="/upload.css" />
    <link rel="stylesheet" href="/common.css" />
  </head>
  <body>
    <div id="topbarMount"></div>
    <div class="page-banner"><div id="announcementBar" class="announcement-bar hidden"></div></div>

    <main class="page-shell wide">
      <section class="hero-card" style="margin-top:18px;">
        <div>
          <div class="eyebrow" data-i18n="change.eyebrow"></div>
          <h1 data-i18n="change.title"></h1>
          <p class="intro" data-i18n="change.subtitle"></p>
        </div>
        <div class="stats-grid">
          <article class="stat-card"><span>Latest</span><strong>v3</strong></article>
          <article class="stat-card"><span>Status</span><strong>Live</strong></article>
        </div>
      </section>

      <section class="timeline" style="margin-top:18px;">
        <article class="timeline-item">
          <div class="eyebrow">v3</div>
          <h3 data-i18n="change.v3"></h3>
          <ul>
            <li data-i18n="change.v3.p1"></li>
            <li data-i18n="change.v3.p2"></li>
            <li data-i18n="change.v3.p3"></li>
            <li data-i18n="change.v3.p4"></li>
          </ul>
        </article>
        <article class="timeline-item">
          <div class="eyebrow">v2</div>
          <h3 data-i18n="change.v2"></h3>
          <ul>
            <li data-i18n="change.v2.p1"></li>
            <li data-i18n="change.v2.p2"></li>
            <li data-i18n="change.v2.p3"></li>
          </ul>
        </article>
      </section>
    </main>

    <footer class="page-footer" data-i18n="footer.credit"></footer>
    <script src="/common.js"></script>
  </body>
</html>
